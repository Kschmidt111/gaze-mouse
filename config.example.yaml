camera:
  index: 0
  width: 640
  height: 480
  fps_target: 30

screen:
  # primary | virtual_desktop — see docs before changing
  mode: primary

gaze:
  gain_x: 1.0
  gain_y: 1.0
  prediction_alpha: 0.28
  prediction_outlier_px: 100
  feature_smoothing_alpha: 0.4
  smoothing_alpha: 0.22
  max_jump_px: 50

safety:
  kill_key: escape
  face_lost_frames: 5
  on_face_lost: stop_updates

calibration:
  grid: 4x4
  samples_per_point: 100
  dwell_ms_to_start: 700

model:
  type: cnn
  backbone: resnet18
  crop_size: 128
  hidden: [48, 24]
  learning_rate: 0.0001
  epochs: 250
  batch_size: 16

profile: default
