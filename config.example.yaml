camera:
  index: 0
  width: 640
  height: 480
  fps_target: 30

screen:
  # primary | virtual_desktop — see docs before changing
  mode: primary

gaze:
  gain_x: 1.0
  gain_y: 1.0
  smoothing_alpha: 0.25
  max_jump_px: 120

safety:
  kill_key: escape
  face_lost_frames: 5
  on_face_lost: stop_updates

calibration:
  grid: 3x3
  # More samples + longer dwell usually lowers val error (v3 eye features need recalibrate).
  samples_per_point: 80
  dwell_ms_to_start: 600

model:
  type: ridge
  # ridge first; try mlp after ridge val improves. Small net matches ~84-D eye features.
  hidden: [48, 24]
  learning_rate: 0.0005
  epochs: 400
  batch_size: 32

profile: default
