camera:
  index: 0
  width: 640
  height: 480
  fps_target: 30

screen:
  # primary | virtual_desktop — see docs before changing
  mode: primary

gaze:
  gain_x: 1.0
  gain_y: 1.0
  smoothing_alpha: 0.25
  max_jump_px: 120

safety:
  kill_key: escape
  face_lost_frames: 5
  on_face_lost: stop_updates

calibration:
  grid: 3x3
  samples_per_point: 45
  dwell_ms_to_start: 400

model:
  type: mlp
  hidden: [128, 64]
  learning_rate: 0.001
  epochs: 200
  batch_size: 64

profile: default
